    <style>
      h2 {
          margin-bottom: 20px;
          color: #fff;
      }
  
      /* Table container */
      .table-container {
          margin: 0 auto;
          width: 100%;
          max-width: 1000px;
          box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
          border-radius: 8px;
          background: #6cb1e2;
          margin-bottom: 80px; /* Gives spacing above the fixed footer */
      }
  
      /* Explicitly styling this exact table to override global defaults */
      #data-table {
          width: 100% !important;
          border-collapse: collapse !important;
      }
  
      /* Desktop View overrides for paddings */
      #data-table th, 
      #data-table td {
          padding: 12px 15px !important; /* Forces standard padding instead of 75px global */
          text-align: center;
      }
  
      /* Header styling */
      #data-table th {
          background-color: #15284c;
          color: white;
          font-weight: 600;
          text-transform: uppercase;
          font-size: 1.5rem;
      }
  
      /* Row Background overrides */
      #data-table tr:nth-child(even) {
          background-color: #15284c !important;
          color: white !important;
      }
  
      #data-table tr:nth-child(odd) {
          background-color: #6cb1e2 !important;
          color: #15284c !important;
      }
  
      .loading {
          font-size: 1.2rem;
          color: #666;
          margin-top: 20px;
          text-align: center;
      }
  
      /* --- Mobile Responsive Rules Overriding Global Styles --- */
      @media screen and (max-width: 600px) {
          /* Strip background and shadows from container */
          .table-container {
              background: none !important;
              box-shadow: none !important;
              border-radius: 0 !important;
              padding: 0 10px;
              box-sizing: border-box;
          }
  
          /* Force table elements to stack vertically */
          #data-table, 
          #data-table thead, 
          #data-table tbody, 
          #data-table th, 
          #data-table td, 
          #data-table tr {
              display: block !important;
              width: 100% !important;
          }
  
          /* Hide desktop table header rows completely */
          #data-table thead tr {
              position: absolute !important;
              top: -9999px !important;
              left: -9999px !important;
          }
  
          /* Format each table row as its own floating card */
          #data-table tbody tr {
              background-color: #15284c !important; /* Uniform background for dark contrast cards */
              color: #fff !important;
              margin-bottom: 15px !important;
              border-radius: 8px !important;
              padding: 10px 15px !important;
              box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15) !important;
              box-sizing: border-box !important;
          }
  
          /* Format the cells inside the card */
          #data-table td {
              border: none !important;
              border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
              position: relative !important;
              padding: 10px 0 10px 40% !important; /* Absolute reset of the global 75px pads */
              text-align: right !important;
              font-size: 1rem !important;
              box-sizing: border-box;
          }
  
          #data-table td:last-child {
              border-bottom: none !important;
          }
  
          /* Inject labels from JavaScript variables into the left column of the card */
          #data-table td::before {
              content: attr(data-label);
              position: absolute;
              left: 10px;
              top: 50%;
              transform: translateY(-50%);
              width: 35%;
              text-align: left;
              font-weight: bold;
              /* color: #6cb1e2; Light blue label token headers */
              text-transform: uppercase;
              font-size: 0.85rem;
          }
      }
  </style>

    <h2>2024 Schedule</h2>
    <div id="loading" class="loading">Loading table data...</div>
    
    <div class="table-container" id="table-wrapper" style="display: none;">
        <table id="data-table">
            <thead>
                <tr id="table-header"></tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQVKYy9CirLhrfRM3gSLGB_ES6dTbIfci4s6bkoE2L3kVw6ziDwJ3APkpS-gpN8N5t3V5EcLKhZdTSr/pub?gid=0&single=true&output=csv";

        function parseCSV(text) {
            let p = '', c = [], r = [];
            let q = false;
            for (let i = 0; i < text.length; i++) {
                let char = text[i];
                if (char === '"') { q = !q; }
                else if (char === ',' && !q) { r.push(p); p = ''; }
                else if (char === '\r') {} 
                else if (char === '\n' && !q) { r.push(p); p = ''; c.push(r); r = []; }
                else { p += char; }
            }
            if (p || r.length) { r.push(p); c.push(r); }
            return c;
        }

        async function loadTable() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                const rows = parseCSV(csvText);

                if (rows.length === 0) return;

                const headerRow = document.getElementById('table-header');
                const bodyContainer = document.getElementById('table-body');

                // 1. Generate Headers
                const headers = rows[0];
                headers.forEach(headerText => {
                    const th = document.createElement('th');
                    th.textContent = headerText;
                    headerRow.appendChild(th);
                });

                // 2. Generate Data Rows
                for (let i = 1; i < rows.length; i++) {
                    const rowData = rows[i];
                    if (rowData.length === 1 && rowData[0] === "") continue;

                    const tr = document.createElement('tr');
                    rowData.forEach((cellText, index) => {
                        const td = document.createElement('td');
                        td.textContent = cellText;
                        // Key adjustment: Save header titles to individual cells as data attributes
                        td.setAttribute('data-label', headers[index] || '');
                        tr.appendChild(td);
                    });
                    bodyContainer.appendChild(tr);
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('table-wrapper').style.display = 'block';

            } catch (error) {
                console.error("Error loading sheet data:", error);
                document.getElementById('loading').innerText = "Failed to load table data.";
            }
        }

        loadTable();
    </script>
