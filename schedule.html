    <body>
    
        <h2>2024 Schedule</h2>
        <div id="loading" class="loading">Loading table data...</div>
        
        <div class="table-container" id="table-wrapper" style="display: none;">
            <table id="data-table">
                <thead>
                    <tr id="table-header"></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    
        <script>
            // Paste your Published CSV URL here
            const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQVKYy9CirLhrfRM3gSLGB_ES6dTbIfci4s6bkoE2L3kVw6ziDwJ3APkpS-gpN8N5t3V5EcLKhZdTSr/pub?gid=0&single=true&output=csv";
    
            // Helper function to parse CSV safely (handles commas inside quotes)
            function parseCSV(text) {
                let p = '', c = [], r = [];
                let q = false;
                for (let i = 0; i < text.length; i++) {
                    let char = text[i], next = text[i+1];
                    if (char === '"') { q = !q; }
                    else if (char === ',' && !q) { r.push(p); p = ''; }
                    else if (char === '\r') {} // ignore carriage returns
                    else if (char === '\n' && !q) { r.push(p); p = ''; c.push(r); r = []; }
                    else { p += char; }
                }
                if (p || r.length) { r.push(p); c.push(r); }
                return c;
            }
    
            async function loadTable() {
                try {
                    const response = await fetch(SHEET_CSV_URL);
                    const csvText = await response.text();
                    const rows = parseCSV(csvText);
    
                    if (rows.length === 0) return;
    
                    const headerRow = document.getElementById('table-header');
                    const bodyContainer = document.getElementById('table-body');
    
                    // 1. Generate Headers (First row of the sheet)
                    const headers = rows[0];
                    headers.forEach(headerText => {
                        const th = document.createElement('th');
                        th.textContent = headerText;
                        headerRow.appendChild(th);
                    });
    
                    // 2. Generate Data Rows
                    for (let i = 1; i < rows.length; i++) {
                        const rowData = rows[i];
                        // Skip empty rows
                        if (rowData.length === 1 && rowData[0] === "") continue;
    
                        const tr = document.createElement('tr');
                        rowData.forEach(cellText => {
                            const td = document.createElement('td');
                            td.textContent = cellText;
                            tr.appendChild(td);
                        });
                        bodyContainer.appendChild(tr);
                    }
    
                    // Show table, hide loading message
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('table-wrapper').style.display = 'block';
    
                } catch (error) {
                    console.error("Error loading sheet data:", error);
                    document.getElementById('loading').innerText = "Failed to load table data.";
                }
            }
    
            // Run on load
            loadTable();
        </script>
